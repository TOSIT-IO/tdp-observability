---
- name: alloy_server_install
  depends_on: []

- name: alloy_server_config
  depends_on:
    - tdp-cluster_config
    - alloy_server_install

- name: alloy_server_start
  depends_on:
    - alloy_server_config

- name: alloy_install
  noop: yes
  depends_on:
    - alloy_server_install

- name: alloy_config
  noop: yes
  depends_on:
    - alloy_install
    - alloy_server_config

- name: alloy_start
  noop: yes
  depends_on:
    - alloy_config
    - alloy_server_start

- name: alloy_init
  noop: yes
  depends_on:
    - alloy_start

